version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: agenticrag-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # GPU 加速（如果主机有 NVIDIA GPU）
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  app:
    build: .
    container_name: agenticrag-app
    depends_on:
      - ollama
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - EMBEDDING_MODEL=bge-m3
      - CHAT_MODEL=agenticrag-model
      - HOST=0.0.0.0
      - PORT=8000
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
    volumes:
      - chroma_data:/app/chroma_db
      - memory_data:/app/memory_db
      - uploads_data:/app/uploads
      - models_data:/app/models
    restart: unless-stopped
    # 如果需要 GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  ollama_data:
  chroma_data:
  memory_data:
  uploads_data:
  models_data:
